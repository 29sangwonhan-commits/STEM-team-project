<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkMind AI | The Ultimate Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #fff5f8 0%, #ffe4ed 100%); color: #4b5563; scroll-behavior: smooth; }
        .glass-chat { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 2px solid white; border-radius: 2.5rem; box-shadow: 0 25px 60px rgba(244, 114, 182, 0.2); }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .bubble-ai { background: white; border-radius: 22px 22px 22px 5px; border: 1px solid #fce7f3; line-height: 1.6; white-space: pre-line; }
        .bubble-user { background: #ec4899; color: white; border-radius: 22px 22px 5px 22px; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body>

    <section class="flex flex-col items-center py-12 px-4">
        <img src="Screenshot 2026-03-16 140742.png" class="floating w-36 h-36 rounded-[2.8rem] shadow-2xl mb-6 object-cover border-4 border-white">
        <h1 class="text-4xl font-extrabold text-pink-600 mb-2">PinkMind AI</h1>
        <p class="text-pink-400 font-medium mb-10 text-center uppercase tracking-widest text-xs">Massive Response Database v2.0</p>

        <div class="w-full max-w-2xl h-[650px] glass-chat flex flex-col overflow-hidden mb-16">
            <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6">
                <div class="flex justify-start">
                    <div class="bubble-ai p-4 shadow-sm max-w-[90%] text-sm">
                        Hello! 🌸 I am now updated with twice the knowledge. I can help with school, social media, mental health, and more. 
                        
                        How are you feeling in this exact moment?
                    </div>
                </div>
            </div>

            <div class="p-5 bg-white/60 border-t border-pink-50">
                <div class="flex items-center space-x-2 bg-white rounded-2xl p-2 border-2 border-pink-100">
                    <input id="user-input" type="text" placeholder="Type anything (e.g. 'I feel invisible' or 'Social media stress')..." class="bg-transparent flex-1 px-4 py-2 outline-none text-gray-700 text-sm">
                    <button id="send-btn" class="bg-pink-500 text-white px-6 py-2 rounded-xl font-bold hover:scale-105 transition">Send</button>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-4xl mx-auto px-6 py-20 border-t border-pink-100 text-center">
        <h2 class="text-3xl font-bold text-pink-600 mb-6 italic">About PinkMind</h2>
        <div class="relative overflow-hidden w-full pt-[56.25%] rounded-3xl shadow-2xl border-4 border-white mb-10">
            <iframe class="absolute top-0 left-0 w-full h-full" src="https://www.youtube.com/embed/gkZiBnL0h7Y" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const masterAdvice = `Depression: Talk to someone you trust, get sunlight, and do small activities like walking or listening to music.
Anger: Take deep breaths, step away from the situation, and count to 10 before reacting.
Anxiety: Focus on slow breathing, write down your worries, and break tasks into small steps.
Nervousness: Practice what you are worried about, relax your muscles, and think positive thoughts.
For all: Get enough sleep, exercise regularly, and consider talking to a counselor or therapist.`;

        // DOUBLE MEGA RESPONSE LIBRARY
        const responses = {
            "happy": "Enjoy this feeling! 💖 Happiness is contagious. Try to do one small thing to make someone else's day better too!",
            "excited": "That's high-vibe energy! ✨ Channel it into a hobby or share the excitement with a family member.",
            "sad": "It's okay to let the tears fall. 💗 Healing isn't a straight line. Be kind to yourself today.",
            "tired": "Burnout is real. 🛌 Give yourself permission to do absolutely nothing for 30 minutes. Recharge your battery.",
            "bored": "Boredom is where ideas are born! 🎨 Try: Learning to cook a 3-ingredient snack or writing a letter to your future self.",
            "stress": "Your mind is like water; when it's agitated, it's hard to see. 🌬️ Take 5 deep breaths and focus only on the air.",
            "exam": "You are more than a grade. 📖 Review your notes, then get a full 8 hours of sleep. Your brain needs rest to remember!",
            "lonely": "I am here! 🫂 Loneliness is just a feeling, not a fact. Try listening to a podcast—it's like having a conversation in the room.",
            "angry": "Cool down time. 😤 Drink some cold water and try to describe your anger as a color. It helps separate you from the emotion.",
            "scared": "Fear is a reaction; courage is a decision. 🛡️ You are safe here. Name 3 things you can hear right now.",
            "invisible": "I see you! 🌟 You have a unique voice and a place in this world. Don't let quiet moments make you feel small.",
            "phone": "Social media can be a thief of joy. 📱 Try a 'Digital Sunset'—no screens 1 hour before bed.",
            "bullying": "You are brave and you are enough. 🛑 Please don't keep this a secret. Talk to a teacher or a parent today.",
            "friend": "Friends come and go, but your peace of mind is forever. 🎀 Focus on those who make you feel safe to be yourself.",
            "family": "Family can be difficult. 🏠 Find a safe space in your room or at school where you can just be you.",
            "body": "Your body is your home. 🌸 Treat it with respect. Feed it well, move it often, and speak to it kindly.",
            "future": "Don't worry about 'forever.' 🌈 Focus on making the next 24 hours good. The future will take care of itself.",
            "money": "Financial stress is heavy. 💸 Focus on the things that are free: a walk in the park, a good library book, or a sunset.",
            "failure": "Mistakes are proof you are trying. 🎓 Even the most successful people failed hundreds of times first.",
            "crush": "Relationships are a journey! 💖 Be honest with your feelings, but always put your own happiness first.",
            "addiction": "Recognizing a habit is the first step. 🛑 Reach out to a professional or a counselor. You don't have to quit alone.",
            "ugly": "Beauty is about character, not mirrors. 🌟 You have a light inside you that no one else has.",
            "stupid": "Intelligence comes in many forms. 💡 Maybe you aren't a math person, but you might be an artist or a great listener!",
            "worthless": "You are a once-in-a-lifetime occurrence. 🕊️ The world is different because you are in it. You matter.",
            "anxious": "Anxiety is just your brain trying to protect you. 🌬️ Tell it 'Thanks, but I'm safe right now.'",
            "nervous": "Nervousness and excitement feel the same in the body. 🎢 Tell yourself you're just excited for the challenge!",
            "guilt": "If you learned from it, it wasn't a waste. 🕊️ Apologize if you can, then let the weight go. You deserve peace.",
            "shame": "Shame dies when stories are told in safe spaces. 🫂 Talk to someone you trust. You have nothing to be ashamed of.",
            "hope": "Keep that spark alive! 🕯️ Better days are always around the corner. Believe in the possibility of good things.",
            "confused": "Confusion is just the step before clarity. 🧩 Sit with the questions for a while. The answers will come.",
            "creative": "Your creativity is a gift! 🎭 Use it to express what words can't. Draw, sing, or build something today.",
            "motivation": "Motivation follows action. 🚀 Do one small thing—like making your bed. The rest will get easier.",
            "heartbreak": "Time heals what words cannot. 💔 Be patient with yourself. Your heart is stronger than you think.",
            "english": "For your English test: 📝 Focus on your 'PEE' paragraphs (Point, Evidence, Explanation). You've got this!",
            "math": "Math is just a language of patterns. 🔢 Take it one equation at a time. Don't be afraid to ask for help!",
            "science": "The whole world is a lab! 🧪 Stay curious. Understanding how things work makes the world less scary.",
            "history": "We learn from the past to build the future. 🏛️ You are making your own history every single day.",
            "sport": "Win or lose, you're building strength. 🏃‍♀️ Focus on the fun of the game and the effort you put in.",
            "gym": "Exercise is a natural antidepressant! 🏋️‍♂️ Even a 10-minute stretch can change your whole mood.",
            "water": "Hydration is key for brain power! 💧 Go grab a glass of water right now. Your brain will thank you.",
            "food": "Fuel your body with things that make you feel good. 🍎 A healthy snack can help stabilize your mood.",
            "music": "Let the music play! 🎧 Songs can say what we can't. Create a 'Mood Boost' playlist for tough days.",
            "advice": "My best advice? 💡 Treat yourself the way you would treat your best friend. Be gentle and patient.",
            "help": "I'm here for you! 🆘 If you need serious help, please call a local helpline. You are never truly alone.",
            "joke": "Why did the scarecrow win an award? Because he was outstanding in his field! 😂 Hope that helped!",
            "thanks": "You are so welcome! 💖 I'm always here in your browser whenever you need a chat.",
            "hello": "Hi bestie! ✨ I'm PinkMind. Tell me what's on your mind today—I'm listening!",
            "weather": "Rain or shine, you can make it a great day. ☀️ If it's raining, it's a perfect day for tea and a book!",
            "parents": "Parents aren't perfect. 🏠 Try to communicate calmly, but remember it's okay to have your own boundaries.",
            "grades": "A letter on a paper doesn't define your soul. 📝 Do your best, but don't let grades steal your happiness.",
            "internet": "The internet is a big place. 🌐 Stay safe, be kind to others, and remember to look up at the real world too."
        };

        function addMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
            const msg = document.createElement('div');
            msg.className = isUser ? "bubble-user p-4 max-w-[85%] text-sm shadow-md" : "bubble-ai p-5 shadow-sm max-w-[90%] text-sm";
            msg.innerText = text;
            wrapper.appendChild(msg);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleSend() {
            const raw = userInput.value.trim();
            const low = raw.toLowerCase();
            if (!raw) return;

            addMessage(raw, true);
            userInput.value = '';

            if (low.includes('happy') || low.includes('excited') || low.includes('great')) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ec4899', '#fbcfe8'] });
            }

            setTimeout(() => {
                let found = false;
                for (let key in responses) {
                    if (low.includes(key)) {
                        addMessage(responses[key] + "\n\n---\nCore Advice for " + key + ":\n" + masterAdvice);
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    addMessage("I am listening. Regardless of the situation, here is the PinkMind guide to mental wellness:\n\n" + masterAdvice);
                }
            }, 800);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
