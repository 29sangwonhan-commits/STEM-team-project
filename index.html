<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkMind AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div id="landing-page" class="max-w-md w-full text-center space-y-10">
        <img src="Screenshot 2026-03-16 140742.png" class="floating-img mx-auto rounded-[3rem] shadow-2xl w-40 h-40 object-cover">
        <h1 class="text-5xl font-extrabold text-pink-600">PinkMind AI</h1>
        <button onclick="switchToChat()" class="start-btn">Chat with us now!</button>
    </div>

    <div id="chat-page" class="hidden w-full max-w-2xl h-[85vh] glass-container flex flex-col overflow-hidden">
        <header class="p-6 border-b border-pink-100 flex items-center space-x-4">
            <img src="Screenshot 2026-03-16 140742.png" class="w-12 h-12 rounded-full border-2 border-pink-300 object-cover">
            <h2 class="font-bold text-pink-700">PinkMind Bestie</h2>
        </header>

        <main id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6"></main>

        <footer class="p-6">
            <div class="input-wrapper">
                <input id="user-input" type="text" placeholder="Type something...">
                <button id="send-btn">Send</button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
